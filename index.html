<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Reception Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #2563eb; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; --red: #ef4444; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; }
        .btn { background: var(--gold); color: var(--dark); padding: 12px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { color: var(--gold); }
        .search-box { background: #1e293b; border: 1px solid var(--blue); padding: 10px; width: 300px; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>RECEPTION CONTROL PANEL (PRIVATE)</h2>
    <div class="grid">
        <div class="card">
            <h3>Diiwaangeli</h3>
            <input type="text" id="pName" placeholder="Magaca Bukaanka">
            <input type="text" id="pNum" placeholder="Lambar Tikidh">
            <input type="number" id="pRoom" placeholder="Qolka">
            <input type="tel" id="pPhone" placeholder="Mobile Bukaanka">
            <input type="tel" id="pGuardian" placeholder="Mobile Mas'uulka">
            <select id="pPriority">
                <option value="Caadi">Caadi</option>
                <option value="Deg-deg">Deg-deg</option>
            </select>
            <button class="btn" onclick="sendToTV()">U DIR TV-GA & KEYDI</button>
        </div>
        <div class="card">
            <input type="text" id="search" class="search-box" onkeyup="searchTable()" placeholder="Raadi Magac ama Mobile...">
            <table>
                <thead>
                    <tr><th>#</th><th>Magaca</th><th>Mobile</th><th>Waqtiga</th><th>Action</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendToTV() {
            const name = document.getElementById('pName').value;
            const num = document.getElementById('pNum').value;
            const room = document.getElementById('pRoom').value;
            const phone = document.getElementById('pPhone').value;
            const guardian = document.getElementById('pGuardian').value;
            const prio = document.getElementById('pPriority').value;

            if(name && num && room) {
                const time = new Date().toLocaleTimeString();
                db.ref('live_queue').set({ name, num, room });
                db.ref('patient_history').push({ name, num, room, phone, guardian, prio, time });
                document.getElementById('pName').value = "";
                document.getElementById('pNum').value = "";
            }
        }

        db.ref('patient_history').on('value', (snapshot) => {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = "";
            snapshot.forEach((child) => {
                const item = child.val();
                tbody.insertAdjacentHTML('afterbegin', `<tr>
                    <td>${item.num}</td><td>${item.name}</td><td>${item.phone}</td><td>${item.time}</td>
                    <td><button style="background:var(--red); color:white; border:none; padding:5px; cursor:pointer;" onclick="deleteItem('${child.key}')">Tirtir</button></td>
                </tr>`);
            });
        });

        function deleteItem(id) { if(confirm("Ma tirtirtaa?")) db.ref('patient_history').child(id).remove(); }
        function searchTable() {
            let val = document.getElementById('search').value.toLowerCase();
            let rows = document.getElementById('historyBody').getElementsByTagName('tr');
            for(let r of rows) { r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none"; }
        }
    </script>
</body>
</html>
