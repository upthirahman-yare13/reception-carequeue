<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Reception</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn-reg { background: #3b82f6; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-reg:hover { background: #2563eb; }
        .search-box { background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        #searchResult { margin-top: 5px; font-size: 14px; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <h2>Diiwaangelinta Bukaanka</h2>

    <div class="search-box">
        <label>Raadi Bukaankii hore (Magaca):</label>
        <input type="text" id="searchInput" onkeyup="searchPatient()" placeholder="Ku qor magaca halkan...">
        <div id="searchResult"></div>
    </div>

    <hr>

    <input type="text" id="pName" placeholder="Magaca Bukaanka Cusub" required>
    <input type="text" id="pComplaint" placeholder="Cabashada Bukaanka" required>
    <select id="pFee">
        <option value="10">Consultation ($10)</option>
        <option value="15">Emergency ($15)</option>
        <option value="5">Follow-up ($5)</option>
    </select>
    
    <button class="btn-reg" onclick="registerAndPay()">Diiwaangeli & U dir Dhakhtarka</button>
</div>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = { databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Shaqada Raadinta (Search Function)
    function searchPatient() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const resultDiv = document.getElementById('searchResult');
        
        if (query.length < 2) { resultDiv.innerHTML = ""; return; }

        db.ref('patient_history').orderByChild('name').startAt(query).endAt(query + "\uf8ff").limitToFirst(5).once('value', (snap) => {
            const data = snap.val();
            resultDiv.innerHTML = "";
            if (data) {
                for (let key in data) {
                    resultDiv.innerHTML += `<div style="cursor:pointer; padding:5px; border-bottom:1px solid #ddd;" onclick="fillForm('${data[key].name}')">
                        📍 ${data[key].name} </div>`;
                }
            } else {
                resultDiv.innerHTML = "Bukaan hore looma helin.";
            }
        });
    }

    function fillForm(name) {
        document.getElementById('pName').value = name;
        document.getElementById('searchResult').innerHTML = "";
    }

    // 3. Diiwaangelinta, Dhakhtarka, iyo Dakhliga
    function registerAndPay() {
        const name = document.getElementById('pName').value;
        const complaint = document.getElementById('pComplaint').value;
        const fee = document.getElementById('pFee').value;

        if (name && complaint) {
            const timestamp = new Date().toISOString();
            const dateStr = new Date().toLocaleDateString().replace(/\//g, '-'); // Format: DD-MM-YYYY

            // A. U dir Dhakhtarka (live_queue) - Tan Doctor-ka ayaa akhrinaya
            db.ref('live_queue').push({
                name: name,
                complaint: complaint,
                status: "waiting",
                time: new Date().toLocaleTimeString()
            });

            // B. Ku dar Dakhliga Maanta (daily_revenue) - Tan Admin-ka ayaa akhrinaya
            db.ref('daily_revenue/' + dateStr).push({
                patientName: name,
                amount: parseFloat(fee),
                time: new Date().toLocaleTimeString()
            });

            // C. Ku dar Taariikhda Guud (patient_history) - Tan Raadinta ayaa isticmaasha
            db.ref('patient_history').push({
                name: name.toLowerCase(),
                lastVisit: timestamp
            });

            alert("Guul! Bukaanka waa la diiwaangeliyey, dakhligana waa la xisaabiyey.");
            
            // Nadiifi Form-ka
            document.getElementById('pName').value = "";
            document.getElementById('pComplaint').value = "";
        } else {
            alert("Fadlan buuxi magaca iyo cabashada!");
        }
    }
</script>

</body>
</html>
