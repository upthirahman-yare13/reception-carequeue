<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Live Queue | World-Class System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --blue: #1e40af; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        
        /* 1. Admin Section (Reception) */
        .admin-panel { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn { background: var(--gold); color: var(--dark); padding: 15px; width: 95%; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }

        /* 2. Display Section (TV Screen) */
        .tv-display { background: var(--card); padding: 40px; border-radius: 30px; text-align: center; border: 4px solid var(--blue); }
        .ticket-box { font-size: 150px; color: var(--gold); font-weight: 900; margin: 20px 0; text-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .room-tag { font-size: 40px; background: var(--blue); padding: 10px 30px; border-radius: 50px; }

        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--blue); padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>ISBITAALKA CAALAMIGA AH (Queue System)</h1>
    <p>Heerka London & Dubay - Powered by Abdirahman Tech</p>
</div>

<div class="grid">
    <div class="admin-panel">
        <h3>RECEPTION (Gali Xogta)</h3>
        <label>Magaca Bukaanka:</label>
        <input type="text" id="pName" placeholder="Tusaale: Axmed Cali">
        <label>Lambarka Tikidhka:</label>
        <input type="text" id="pNum" placeholder="Tusaale: A-105">
        <label>Qolka Dhakhtarka:</label>
        <input type="number" id="pRoom" placeholder="Tusaale: 3">
        <button class="btn" onclick="sendToTV()">U DIR TV-GA (CALL NEXT)</button>
    </div>

    <div class="tv-display">
        <div style="font-size: 24px; color: #94a3b8;">BUKAANKA HADDA (NOW SERVING)</div>
        <div class="ticket-box" id="displayNum">---</div>
        <div id="displayName" style="font-size: 35px; margin-bottom: 20px;">Fadlan Sug...</div>
        <div class="room-tag">AAD QOLKA: <span id="displayRoom">0</span></div>
    </div>
</div>

<script>
    // 1. Firebase Setup (Halkan geli xogtaada Firebase hadhow)
    const firebaseConfig = {
        databaseURL: "https://GELI-DATABASE-KAAGA-HALKAN.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. FUNKSHANKA RECEPTION-KA (U diridda Database-ka)
    function sendToTV() {
        const name = document.getElementById('pName').value;
        const num = document.getElementById('pNum').value;
        const room = document.getElementById('pRoom').value;

        if(name && num && room) {
            db.ref('queue/current').set({
                patientName: name,
                ticketNum: num,
                roomNum: room,
                timestamp: Date.now()
            });
            alert("Waa loo yeeray bukaanka!");
        } else {
            alert("Fadlan buuxi meelaha banaan!");
        }
    }

    // 3. FUNKSHANKA TV-GA (Maqalka Database-ka - Realtime)
    db.ref('queue/current').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('displayNum').innerText = data.ticketNum;
            document.getElementById('displayName').innerText = data.patientName;
            document.getElementById('displayRoom').innerText = data.roomNum;

            // Codka yeeraya (Voice)
            const speech = new SpeechSynthesisUtterance();
            speech.text = `Bukaan lambar ${data.ticketNum}, fadlan gal qolka ${data.roomNum}`;
            speech.lang = 'en-US'; // Waxaad u bedeli kartaa Soomaali hadii browserku ogol yahay
            window.speechSynthesis.speak(speech);
        }
    });
</script>

</body>
</html>
