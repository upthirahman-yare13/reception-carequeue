<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareQueue | Admin & TV</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #1e40af; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .wrapper { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; max-width: 1100px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; }
        .btn { background: var(--gold); color: var(--dark); padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .display-box { text-align: center; border: 4px solid var(--blue); }
        .big-text { font-size: 90px; color: var(--gold); margin: 10px 0; font-weight: bold; }
        
        /* Dashboard Table Style */
        .history-section { max-width: 1100px; margin: 30px auto; background: var(--card); padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--gold); }
        tr:hover { background: #334155; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--gold);">CAREQUEUE PRO SYSTEM</h1>

    <div class="wrapper">
        <div class="box">
            <h3>RECEPTION</h3>
            <input type="text" id="pName" placeholder="Magaca Bukaanka">
            <input type="text" id="pNum" placeholder="Lambar Tikidh">
            <input type="number" id="pRoom" placeholder="Qolka">
            <button class="btn" onclick="updateQueue()">U DIR TV-GA</button>
        </div>

        <div class="box display-box">
            <div style="color: #94a3b8;">BUKAANKA HADDA TAAGAN</div>
            <div class="big-text" id="displayNum">---</div>
            <div id="displayName" style="font-size: 28px;">Sugitaanka...</div>
            <div style="margin-top:20px; background: var(--blue); display:inline-block; padding:10px 30px; border-radius:50px;">
                QOLKA: <span id="displayRoom">0</span>
            </div>
        </div>
    </div>

    <div class="history-section">
        <h3>DIIWAANKA BUKAANADA (ADMIN ONLY)</h3>
        <table>
            <thead>
                <tr>
                    <th>Tikidh</th>
                    <th>Magaca</th>
                    <th>Qolka</th>
                    <th>Waqtiga</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Dirista Xogta
        function updateQueue() {
            const name = document.getElementById('pName').value;
            const num = document.getElementById('pNum').value;
            const room = document.getElementById('pRoom').value;

            if(name && num && room) {
                const now = new Date().toLocaleTimeString();
                
                // Cusboonaysii TV-ga
                db.ref('live_queue').set({ name, num, room });

                // Ku dar Diiwaanka (History)
                db.ref('patient_history').push({ name, num, room, time: now });

                // Nadiifi Input-ka
                document.getElementById('pName').value = "";
                document.getElementById('pNum').value = "";
            }
        }

        // 2. Cusboonaysiinta TV-ga (Live)
        db.ref('live_queue').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('displayNum').innerText = data.num;
                document.getElementById('displayName').innerText = data.name;
                document.getElementById('displayRoom').innerText = data.room;

                const speech = new SpeechSynthesisUtterance(`Bukaan ${data.name}, lambar ${data.num}, gal qolka ${data.room}`);
                speech.rate = 0.9;
                window.speechSynthesis.speak(speech);
            }
        });

        // 3. Soo bandhigista Diiwaanka (History)
        db.ref('patient_history').limitToLast(10).on('value', (snapshot) => {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = ""; // Nadiifi miiska mar kasta
            
            snapshot.forEach((childSnapshot) => {
                const item = childSnapshot.val();
                const row = `<tr>
                    <td>${item.num}</td>
                    <td>${item.name}</td>
                    <td>${item.room}</td>
                    <td>${item.time}</td>
                </tr>`;
                tbody.insertAdjacentHTML('afterbegin', row); // Midka cusub kor ha soo galo
            });
        });
    </script>
</body>
</html>
