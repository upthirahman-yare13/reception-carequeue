<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareQueue Manager | Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #1e40af; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .wrapper { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; max-width: 1000px; margin: auto; }
        .box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #334155; }
        h1 { text-align: center; color: var(--gold); }
        input { width: 95%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; }
        .btn { background: var(--gold); color: var(--dark); padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; }
        .display-box { text-align: center; border: 4px solid var(--blue); }
        .big-text { font-size: 80px; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .room-tag { background: var(--blue); padding: 10px 30px; border-radius: 50px; font-size: 24px; display: inline-block; }
    </style>
</head>
<body>

    <h1>CAREQUEUE MANAGER</h1>

    <div class="wrapper">
        <div class="box">
            <h3>RECEPTION</h3>
            <input type="text" id="pName" placeholder="Magaca Bukaanka">
            <input type="text" id="pNum" placeholder="Lambar Tikidh">
            <input type="number" id="pRoom" placeholder="Qolka">
            <button class="btn" onclick="updateQueue()">U DIR TV-GA</button>
        </div>

        <div class="box display-box">
            <div style="color: #94a3b8;">BUKAANKA HADDA</div>
            <div class="big-text" id="displayNum">---</div>
            <div id="displayName" style="font-size: 30px;">Fadlan sug...</div>
            <br><br>
            <div class="room-tag">QOLKA: <span id="displayRoom">0</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateQueue() {
            const name = document.getElementById('pName').value;
            const num = document.getElementById('pNum').value;
            const room = document.getElementById('pRoom').value;

            if(name && num && room) {
                db.ref('live_queue').set({
                    name: name,
                    num: num,
                    room: room
                });
            } else {
                alert("Fadlan buuxi dhammaan xogta!");
            }
        }

        db.ref('live_queue').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('displayNum').innerText = data.num;
                document.getElementById('displayName').innerText = data.name;
                document.getElementById('displayRoom').innerText = data.room;

                // Codka Faseexka ah
                const messageText = `Bukaan ${data.name}, lambar ${data.num}, fadlan gal qolka ${data.room}`;
                const speech = new SpeechSynthesisUtterance(messageText);
                
                speech.lang = 'so-SO'; 
                speech.rate = 0.9;     
                speech.pitch = 1;      

                window.speechSynthesis.speak(speech);
            }
        });
    </script>
</body>
</html>
