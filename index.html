<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareQueue PRO | Global Standard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #1e40af; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; --red: #ef4444; --green: #22c55e; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .wrapper { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; max-width: 1200px; margin: auto; }
        .box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input, select { width: 95%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; font-size: 16px; }
        .btn { background: var(--gold); color: var(--dark); padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .btn:hover { background: #eab308; }
        .display-box { text-align: center; border: 4px solid var(--blue); position: relative; }
        .big-text { font-size: 100px; color: var(--gold); margin: 10px 0; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        /* Priority Labels */
        .prio-high { color: var(--red); font-weight: bold; }
        .prio-low { color: var(--green); font-weight: bold; }

        /* History Table */
        .history-section { max-width: 1200px; margin: 30px auto; background: var(--card); padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--gold); background: #1e293b; position: sticky; top: 0; }
        .delete-btn { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--gold); letter-spacing: 2px;">CAREQUEUE PRO SYSTEM v2.0</h1>

    <div class="wrapper">
        <div class="box">
            <h3>RECEPTION DASHBOARD</h3>
            <input type="text" id="pName" placeholder="Magaca Bukaanka">
            <input type="text" id="pNum" placeholder="Lambar Tikidh">
            <input type="number" id="pRoom" placeholder="Qolka">
            <select id="pPriority">
                <option value="Caadi">Priority: Caadi</option>
                <option value="Deg-deg" style="color:red;">Priority: Deg-deg</option>
            </select>
            <button class="btn" onclick="updateQueue()">U DIR TV-GA & KEYDI</button>
        </div>

        <div class="box display-box">
            <div style="color: #94a3b8; font-weight: bold;">BUKAANKA HADDA TAAGAN</div>
            <div class="big-text" id="displayNum">---</div>
            <div id="displayName" style="font-size: 32px; margin-bottom: 10px;">Sugitaanka...</div>
            <div style="background: var(--blue); display:inline-block; padding:10px 40px; border-radius:50px; font-size: 24px;">
                QOLKA: <span id="displayRoom">0</span>
            </div>
        </div>
    </div>

    <div class="history-section">
        <h3>DIIWAANKA GUUD (ADMIN CONTROL)</h3>
        <table id="patientTable">
            <thead>
                <tr>
                    <th>Tikidh</th>
                    <th>Magaca</th>
                    <th>Qolka</th>
                    <th>Heerka</th>
                    <th>Waqtiga</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateQueue() {
            const name = document.getElementById('pName').value;
            const num = document.getElementById('pNum').value;
            const room = document.getElementById('pRoom').value;
            const prio = document.getElementById('pPriority').value;

            if(name && num && room) {
                const now = new Date().toLocaleTimeString();
                db.ref('live_queue').set({ name, num, room, prio });
                db.ref('patient_history').push({ name, num, room, prio, time: now });

                document.getElementById('pName').value = "";
                document.getElementById('pNum').value = "";
            }
        }

        db.ref('live_queue').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('displayNum').innerText = data.num;
                document.getElementById('displayName').innerText = data.name;
                document.getElementById('displayRoom').innerText = data.room;

                const speech = new SpeechSynthesisUtterance(`Bukaan ${data.name}, lambar ${data.num}, fadlan gal qolka ${data.room}`);
                speech.rate = 0.85;
                window.speechSynthesis.speak(speech);
            }
        });

        db.ref('patient_history').on('value', (snapshot) => {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = "";
            snapshot.forEach((child) => {
                const item = child.val();
                const prioClass = item.prio === 'Deg-deg' ? 'prio-high' : 'prio-low';
                const row = `<tr>
                    <td>${item.num}</td>
                    <td>${item.name}</td>
                    <td>${item.room}</td>
                    <td class="${prioClass}">${item.prio}</td>
                    <td>${item.time}</td>
                    <td><button class="delete-btn" onclick="deleteEntry('${child.key}')">Tirtir</button></td>
                </tr>`;
                tbody.insertAdjacentHTML('afterbegin', row);
            });
        });

        function deleteEntry(id) {
            if(confirm("Ma hubtaa inaad tirtirto xogtan?")) {
                db.ref('patient_history').child(id).remove();
            }
        }
    </script>
</body>
</html>
