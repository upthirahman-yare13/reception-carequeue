<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Reception Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root { --blue: #2563eb; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; --red: #ef4444; --green: #10b981; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid var(--blue); }
        
        .sidebar-nav { background: var(--card); padding: 10px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px; justify-content: center; }
        .sidebar-nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; background: #334155; font-size: 14px; }
        .sidebar-nav a.active { background: var(--blue); }

        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; display: none; } 
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        h2 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        #pFee { border: 1px solid var(--gold); color: var(--gold); font-weight: bold; }

        .btn { background: var(--blue); color: white; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .btn:hover { background: #1d4ed8; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; font-size: 13px; }
        th { color: var(--gold); }
        .search-box { margin-bottom: 15px; border: 2px solid var(--blue); }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>CAREQUEUE LOGIN</h2>
            <input type="email" id="loginEmail" placeholder="Email-ka Isbitaalka">
            <input type="password" id="loginPass" placeholder="Password-ka">
            <button class="btn" onclick="handleLogin()">GALO NIDAAMKA</button>
        </div>
    </div>

    <div id="admin-content" style="padding: 10px;">
        <div class="sidebar-nav">
            <a href="index.html">🏠 Dashboard</a>
            <a href="reception.html" class="active">✍️ Reception</a>
            <a href="doctor.html">👨‍⚕️ Dhakhtarka</a>
            <a href="pharmacy.html">💊 Farmashiyaha</a>
            <a href="lab.html">🔬 Shaybaarka</a>
            <a href="reports.html">📊 Warbixinta</a>
            <button onclick="firebase.auth().signOut()" style="background:var(--red); border:none; color:white; padding:5px 10px; border-radius:4px; cursor:pointer;">Logout</button>
        </div>

        <h2>CAREQUEUE RECEPTION CONTROL</h2>

        <div class="grid" id="mainGrid">
            <div class="card">
                <h3>Diiwaangelinta Cusub</h3>
                <input type="text" id="pName" placeholder="Magaca Bukaanka">
                <input type="text" id="pNum" placeholder="Lambar Tikidh">
                <input type="tel" id="pPhone" placeholder="Mobile-ka Bukaanka">
                <input type="text" id="dName" placeholder="Magaca Dhakhtarka">
                <input type="number" id="pRoom" placeholder="Qolka Dhakhtarka">
                
                <label style="color: var(--gold); font-size: 13px;">Lacagta laga rabo ($):</label>
                <input type="number" id="pFee" placeholder="Tusaale: 15" value="10">

                <select id="pPriority">
                    <option value="Caadi">Caadi</option>
                    <option value="Deg-deg">Deg-deg</option>
                </select>
                <button class="btn" onclick="sendToTV()">U DIR TV-GA & KEYDI</button>
            </div>

            <div class="card">
                <h3>Bukaanadii Hore (<span id="qCount">0</span>)</h3>
                <input type="text" id="search" class="search-box" onkeyup="searchTable()" placeholder="Raadi Magaca ama Tikidha...">
                <div style="max-height: 450px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr><th>Tikidh</th><th>Bukaanka</th><th>Mobile</th><th>Dhakhtarka</th><th>Action</th></tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB5LuhewiHycIpkMWq-3HUW8yRlsSy4fLA",
            authDomain: "carequeue-manager.firebaseapp.com",
            databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com",
            projectId: "carequeue-manager",
            storageBucket: "carequeue-manager.appspot.com",
            messagingSenderId: "328741466836",
            appId: "1:328741466836:web:d073eb2a501944e6fa8141"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Khalad: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainGrid').style.display = 'grid';
                loadHistory(); 
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('mainGrid').style.display = 'none';
            }
        });

        function sendToTV() {
            const name = document.getElementById('pName').value;
            const num = document.getElementById('pNum').value;
            const phone = document.getElementById('pPhone').value; // Mobile ka bukaanka
            const room = document.getElementById('pRoom').value;
            const doc = document.getElementById('dName').value;
            const fee = document.getElementById('pFee').value;
            const date = new Date().toISOString().split('T')[0];
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if(name && num && phone && room && doc && fee) {
                db.ref('live_queue').set({ name, num, room, doctor: doc });
                // Halkan ayaan ku daray phone xogta la push-gareeyo
                db.ref('patient_history').push({ name, num, phone, room, doctor: doc, time, fee: parseFloat(fee), date: date });
                
                db.ref('transactions').push({
                    patientName: name,
                    amount: parseFloat(fee),
                    date: date,
                    time: time,
                    doctor: doc
                });

                let msg = new SpeechSynthesisUtterance("Bukaanka " + name + ", Lambar " + num + ", fadlan u gudub qolka " + room);
                window.speechSynthesis.speak(msg);

                alert("Waa la keydiyay!");
                document.getElementById('pName').value = ""; 
                document.getElementById('pNum').value = "";
                document.getElementById('pPhone').value = "";
            } else { alert("Fadlan buuxi dhammaan meelaha bannaan!"); }
        }

        function loadHistory() {
            db.ref('patient_history').on('value', (snap) => {
                const tbody = document.getElementById('historyBody');
                document.getElementById('qCount').innerText = snap.numChildren();
                tbody.innerHTML = "";
                snap.forEach((child) => {
                    const item = child.val();
                    tbody.insertAdjacentHTML('afterbegin', `<tr>
                        <td><b>${item.num}</b></td>
                        <td>${item.name}</td>
                        <td>${item.phone}</td>
                        <td>${item.doctor}</td>
                        <td><button onclick="deleteItem('${child.key}')" style="background:var(--red); color:white; border:none; padding:4px; cursor:pointer; border-radius:3px;">Tirtir</button></td>
                    </tr>`);
                });
            });
        }

        function deleteItem(id) { if(confirm("Ma hubtaa?")) db.ref('patient_history').child(id).remove(); }

        function searchTable() {
            let input = document.getElementById("search").value.toUpperCase();
            let tr = document.getElementById("historyBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                tr[i].style.display = tr[i].innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
