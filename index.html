<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Reception Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root { --blue: #2563eb; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; --red: #ef4444; --green: #10b981; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid var(--blue); }
        
        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; display: none; } 
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        
        /* Tabs Style */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .tab-btn { background: #334155; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--blue); border-bottom: 3px solid var(--gold); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { color: var(--gold); text-align: center; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        .logout-btn { background: var(--red); padding: 8px 15px; float: right; cursor: pointer; border: none; color: white; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>CAREQUEUE LOGIN</h2>
            <input type="email" id="loginEmail" placeholder="Email-ka Isbitaalka">
            <input type="password" id="loginPass" placeholder="Password-ka">
            <button class="btn" onclick="handleLogin()">GALO NIDAAMKA</button>
        </div>
    </div>

    <div id="admin-content">
        <button class="logout-btn" onclick="firebase.auth().signOut()">Logout</button>
        <h2>CAREQUEUE CONTROL</h2>
        <div class="grid" id="mainGrid">
            <div class="card">
                <div class="tabs">
                    <button class="tab-btn active" onclick="openTab('queue')">Safka</button>
                    <button class="tab-btn" onclick="openTab('appointment')">Ballan</button>
                </div>

                <div id="queue" class="tab-content active">
                    <h3>Diiwaangelinta Safka</h3>
                    <input type="text" id="pName" placeholder="Magaca Bukaanka">
                    <input type="text" id="pNum" placeholder="Lambar Tikidh">
                    <input type="text" id="dName" placeholder="Magaca Dhakhtarka">
                    <input type="number" id="pRoom" placeholder="Qolka">
                    <button class="btn" onclick="sendToTV()">U DIR TV-GA & KEYDI</button>
                </div>

                <div id="appointment" class="tab-content">
                    <h3>Qor Ballan Cusub</h3>
                    <input type="text" id="appPathName" placeholder="Magaca Bukaanka">
                    <input type="tel" id="appPhone" placeholder="Mobile">
                    <input type="date" id="appDate">
                    <input type="text" id="appDoc" placeholder="Dhakhtarka">
                    <button class="btn" style="background: var(--green);" onclick="saveAppointment()">KEYDI BALLANTA</button>
                    <div id="appointmentList" style="margin-top: 20px;"></div>
                </div>
            </div>

            <div class="card">
                <h3>Bukaanadii Hore (Tirada: <span id="qCount" style="color:var(--gold)">0</span>)</h3>
                <input type="text" id="search" onkeyup="searchTable()" placeholder="Raadi...">
                <table id="historyBody"></table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Ku dheji config-gaaga halkan */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Login & Tab Logic
        function openTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabName === 'appointment') loadAppointments();
        }

        function saveAppointment() {
            const name = document.getElementById('appPathName').value;
            const date = document.getElementById('appDate').value;
            if(name && date) {
                db.ref('appointments').push({ name, date, doc: document.getElementById('appDoc').value });
                alert("Ballanta waa la keydiyey!");
            }
        }

        function loadAppointments() {
            db.ref('appointments').on('value', (s) => {
                const list = document.getElementById('appointmentList');
                list.innerHTML = "";
                s.forEach(c => {
                    const item = c.val();
                    list.innerHTML += `<div style="background:#0f172a; padding:10px; margin-bottom:5px;">${item.name} - ${item.date}</div>`;
                });
            });
        }

        function sendToTV() {
            const name = document.getElementById('pName').value;
            const num = document.getElementById('pNum').value;
            const doc = document.getElementById('dName').value;
            const room = document.getElementById('pRoom').value;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if(name && num) {
                db.ref('live_queue').set({ name, num, doctor: doc, room: room });
                db.ref('patient_history').push({ name, num, doctor: doc, time });
                
                let msg = new SpeechSynthesisUtterance(`Bukaanka ${name}, lambar ${num}, fadlan u gudub ${doc}, qolka ${room}`);
                window.speechSynthesis.speak(msg);
                alert("Waa la diray!");
            }
        }

        // loadHistory iyo searchTable halkan ku dar...
    </script>
</body>
</html>
