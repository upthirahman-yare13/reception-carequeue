<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareQueue Ultra Pro | Reception Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #2563eb; --gold: #fbbf24; --dark: #0f172a; --card: #1e293b; --red: #ef4444; --green: #22c55e; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Form Styling */
        h3 { margin-top: 0; color: var(--gold); border-bottom: 2px solid #334155; padding-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-main { background: var(--gold); color: var(--dark); padding: 15px; width: 100%; border: none; font-weight: 800; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        
        /* Display Styling */
        .display-card { text-align: center; border: 4px solid var(--blue); position: relative; }
        .big-number { font-size: 130px; line-height: 1; color: var(--gold); font-weight: 900; margin: 20px 0; }
        .patient-name { font-size: 35px; color: #f8fafc; margin-bottom: 15px; font-weight: 600; }
        .room-badge { background: var(--blue); padding: 10px 40px; border-radius: 100px; font-size: 24px; font-weight: bold; }
        
        /* Admin Section */
        .admin-controls { margin-top: 30px; }
        .search-box { width: 300px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: var(--gold); font-size: 14px; text-transform: uppercase; }
        .re-call-btn { background: var(--green); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 5px; }
        .del-btn { background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--gold); font-size: 35px; margin-bottom: 30px;">CAREQUEUE ULTRA PRO v3.0</h1>

    <div class="main-grid">
        <div class="card">
            <h3>NEW REGISTRATION</h3>
            <input type="text" id="pName" placeholder="Magaca Bukaanka">
            <input type="text" id="pNum" placeholder="Lambar Tikidh (Tusaale: 101)">
            <input type="number" id="pRoom" placeholder="Qolka">
            <select id="pPriority">
                <option value="Caadi">Priority: Caadi</option>
                <option value="Deg-deg">Priority: Deg-deg (Emergency)</option>
            </select>
            <button class="btn-main" onclick="updateQueue()">U DIR TV-GA & KEYDI</button>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 15px;">* Xogtu waxay si toos ah ugu dhacaysaa Database-ka.</p>
        </div>

        <div class="card display-card">
            <div style="color: #94a3b8; letter-spacing: 2px; font-weight: 700;">LIVE CALLING</div>
            <div class="big-number" id="displayNum">---</div>
            <div class="patient-name" id="displayName">Sugitaanka...</div>
            <div class="room-badge">QOLKA: <span id="displayRoom">0</span></div>
            <br><br>
            <button onclick="announceCurrent()" style="background:none; color:var(--blue); border:1px solid var(--blue); padding:8px 15px; border-radius:5px; cursor:pointer;">
                🔊 KU CELI WICITAANKA
            </button>
        </div>
    </div>

    <div class="admin-controls">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>PATIENT LOGS (DIIWAANKA)</h3>
            <input type="text" id="searchBar" class="search-box" placeholder="Raadi Magaca ama Lambarka..." onkeyup="filterTable()">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Tikidh</th>
                    <th>Magaca Bukaanka</th>
                    <th>Qolka</th>
                    <th>Heerka</th>
                    <th>Waqtiga</th>
                    <th>Settings</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentPatient = null;

    function updateQueue() {
        const name = document.getElementById('pName').value;
        const num = document.getElementById('pNum').value;
        const room = document.getElementById('pRoom').value;
        const prio = document.getElementById('pPriority').value;

        if(name && num && room) {
            const time = new Date().toLocaleTimeString();
            db.ref('live_queue').set({ name, num, room, prio });
            db.ref('patient_history').push({ name, num, room, prio, time });

            document.getElementById('pName').value = "";
            document.getElementById('pNum').value = "";
        }
    }

    // Codka oo la degeeyay (Faseex)
    function announceCurrent() {
        if(currentPatient) {
            const msg = `Bukaan ${currentPatient.name}, lambar ${currentPatient.num}, fadlan gal qolka ${currentPatient.room}`;
            const speech = new SpeechSynthesisUtterance(msg);
            speech.lang = 'so-SO';
            speech.rate = 0.8; // Aad u faseex ah
            window.speechSynthesis.speak(speech);
        }
    }

    db.ref('live_queue').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            currentPatient = data;
            document.getElementById('displayNum').innerText = data.num;
            document.getElementById('displayName').innerText = data.name;
            document.getElementById('displayRoom').innerText = data.room;
            announceCurrent();
        }
    });

    db.ref('patient_history').on('value', (snapshot) => {
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = "";
        snapshot.forEach((child) => {
            const item = child.val();
            const row = `<tr>
                <td><b>#${item.num}</b></td>
                <td>${item.name}</td>
                <td>Qolka ${item.room}</td>
                <td><span style="color:${item.prio === 'Deg-deg' ? '#ef4444' : '#22c55e'}">${item.prio}</span></td>
                <td>${item.time}</td>
                <td>
                    <button class="re-call-btn" onclick="callAgain('${item.name}', '${item.num}', '${item.room}')">Wicid</button>
                    <button class="del-btn" onclick="deleteItem('${child.key}')">Tirtir</button>
                </td>
            </tr>`;
            tbody.insertAdjacentHTML('afterbegin', row);
        });
    });

    function callAgain(name, num, room) {
        db.ref('live_queue').set({ name, num, room });
    }

    function deleteItem(id) {
        if(confirm("Ma hubtaa?")) db.ref('patient_history').child(id).remove();
    }

    function filterTable() {
        let input = document.getElementById("searchBar").value.toLowerCase();
        let rows = document.getElementById("historyBody").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }
</script>
</body>
</html>
