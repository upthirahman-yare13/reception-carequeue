<div class="card">
    <h3>Bukaanka Hadda Sugaya: <span id="doc-name">-</span></h3>
    <button class="btn" onclick="sendToPharmacy()">U DIR FARMASHIYAHA</button>
    <button class="btn" onclick="sendToLab()" style="background:var(--green)">U DIR SHAYBAARKA</button>
</div>

<script>
    // Dhakhtarka wuxuu akhrinayaa live_queue
    db.ref('live_queue').on('value', (snap) => {
        const p = snap.val();
        document.getElementById('doc-name').innerText = p ? p.name : "Ma jiro bukaan";
    });

    function sendToPharmacy() {
        const p = { name: document.getElementById('doc-name').innerText, time: new Date().toLocaleTimeString() };
        db.ref('pharmacy_queue').push(p);
        alert("Bukaanka waxaa loo diray Farmashiyaha");
    }

    function sendToLab() {
        const p = { name: document.getElementById('doc-name').innerText };
        db.ref('lab_queue').push(p);
        alert("Bukaanka waxaa loo diray Shaybaarka");
    }
</script>
