<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
<div class="card">
    <h3>Bukaanka Sugaya: <span id="pName">-</span></h3>
    <button class="btn" onclick="sendTo('pharmacy_queue')">💊 FARMASHIYAHA</button>
    <button class="btn" style="background:var(--green)" onclick="sendTo('lab_queue')">🔬 SHAYBAARKA</button>
</div>
<script>
    db.ref('live_queue').on('value', s => document.getElementById('pName').innerText = s.val() ? s.val().name : "Ma jiro");
    function sendTo(p) { db.ref(p).push({name: document.getElementById('pName').innerText}); alert("Waa la diray"); }
</script>
