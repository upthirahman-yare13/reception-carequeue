<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
<div class="card">
    <h3>🔬 Shaybaarka</h3>
    <table id="list"></table>
</div>
<script>
    db.ref('lab_queue').on('value', s => {
        let list = document.getElementById('list'); list.innerHTML = "";
        s.forEach(c => list.insertAdjacentHTML('beforeend', `<tr><td>${c.val().name}</td><td><button onclick="db.ref('lab_queue/${c.key}').remove()">Done</button></td></tr>`));
    });
</script>
